<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Countdown Lab</title>
  <style>
    :root {
      --bg-1: #f6efe5;
      --bg-2: #d8e7d2;
      --panel: rgba(255, 251, 245, 0.82);
      --text: #1f2a1f;
      --muted: #52614e;
      --accent: #d95d39;
      --accent-strong: #b44522;
      --accent-soft: rgba(217, 93, 57, 0.15);
      --line: rgba(31, 42, 31, 0.12);
      --shadow: 0 24px 80px rgba(54, 52, 44, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.65), transparent 35%),
        radial-gradient(circle at bottom right, rgba(217, 93, 57, 0.16), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      font-family: Georgia, "Times New Roman", serif;
    }

    .shell {
      width: min(920px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: rise 700ms ease-out both;
    }

    .hero {
      padding: 32px 32px 8px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent-strong);
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 7vw, 5.2rem);
      line-height: 0.95;
      font-weight: 700;
    }

    .sub {
      margin: 14px 0 0;
      max-width: 38rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      padding: 24px 32px 32px;
    }

    .clock-card,
    .control-card {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.5);
    }

    .clock-card {
      padding: 28px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .clock-card::before {
      content: "";
      position: absolute;
      inset: auto -60px -90px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: var(--accent-soft);
      z-index: -1;
    }

    .timer-label {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .digits {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .digit-block {
      padding: 18px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(31, 42, 31, 0.08);
      text-align: center;
    }

    .digit-value {
      font-size: clamp(2.6rem, 5vw, 4.8rem);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .digit-name {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .progress-wrap {
      margin-top: 10px;
    }

    .progress-copy {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .progress-bar {
      margin-top: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(31, 42, 31, 0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #ef9b6b);
      transition: width 240ms linear;
    }

    .status {
      margin-top: 22px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      font-size: 1rem;
    }

    .control-card {
      padding: 24px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .section-title {
      margin: 0;
      font-size: 1.2rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      padding: 14px 12px;
      border: 1px solid rgba(31, 42, 31, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.85);
      color: var(--text);
      font: inherit;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      background: var(--accent);
      color: #fff8f3;
    }

    .secondary {
      background: #efe6db;
      color: var(--text);
    }

    .ghost {
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      border: 1px solid rgba(31, 42, 31, 0.12);
    }

    .tips {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .done .digit-value {
      color: var(--accent-strong);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero,
      .layout {
        padding-left: 20px;
        padding-right: 20px;
      }

      .field-grid,
      .button-row,
      .digits {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Interactive Demo</p>
      <h1>Countdown Lab</h1>
      <p class="sub">設定分鐘與秒數後按下開始，這是一個可暫停、繼續與重設的倒數計時器，時間到會顯示完成狀態。</p>
    </section>

    <section class="layout">
      <article class="clock-card" id="clockCard">
        <p class="timer-label">Remaining Time</p>
        <div class="digits" aria-live="polite">
          <div class="digit-block">
            <div class="digit-value" id="hours">00</div>
            <div class="digit-name">Hours</div>
          </div>
          <div class="digit-block">
            <div class="digit-value" id="minutes">05</div>
            <div class="digit-name">Minutes</div>
          </div>
          <div class="digit-block">
            <div class="digit-value" id="seconds">00</div>
            <div class="digit-name">Seconds</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-copy">
            <span id="phase">尚未開始</span>
            <span id="percent">100%</span>
          </div>
          <div class="progress-bar" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="status" id="statusText">預設為 5 分鐘，你可以直接開始，或先修改時間。</div>
      </article>

      <aside class="control-card">
        <h2 class="section-title">Time Setup</h2>
        <div class="field-grid">
          <label>
            Hours
            <input id="inputHours" type="number" min="0" max="23" value="0">
          </label>
          <label>
            Minutes
            <input id="inputMinutes" type="number" min="0" max="59" value="5">
          </label>
          <label>
            Seconds
            <input id="inputSeconds" type="number" min="0" max="59" value="0">
          </label>
        </div>

        <div class="button-row">
          <button class="primary" id="startBtn">開始 / 繼續</button>
          <button class="secondary" id="pauseBtn">暫停</button>
          <button class="ghost" id="resetBtn">重設</button>
          <button class="ghost" id="presetBtn">快速 1 分鐘</button>
        </div>

        <ul class="tips">
          <li>可先設定時間，再按開始。</li>
          <li>暫停後再次按開始會繼續倒數。</li>
          <li>重設會回到目前輸入欄位的設定值。</li>
        </ul>
      </aside>
    </section>
  </main>

  <script>
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const statusTextEl = document.getElementById("statusText");
    const phaseEl = document.getElementById("phase");
    const percentEl = document.getElementById("percent");
    const progressFillEl = document.getElementById("progressFill");
    const clockCardEl = document.getElementById("clockCard");

    const inputHoursEl = document.getElementById("inputHours");
    const inputMinutesEl = document.getElementById("inputMinutes");
    const inputSecondsEl = document.getElementById("inputSeconds");

    const startBtnEl = document.getElementById("startBtn");
    const pauseBtnEl = document.getElementById("pauseBtn");
    const resetBtnEl = document.getElementById("resetBtn");
    const presetBtnEl = document.getElementById("presetBtn");

    let remainingMs = 5 * 60 * 1000;
    let initialMs = remainingMs;
    let endTime = null;
    let timerId = null;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, Number(value) || 0));
    }

    function toMsFromInputs() {
      const hours = clamp(inputHoursEl.value, 0, 23);
      const minutes = clamp(inputMinutesEl.value, 0, 59);
      const seconds = clamp(inputSecondsEl.value, 0, 59);

      inputHoursEl.value = hours;
      inputMinutesEl.value = minutes;
      inputSecondsEl.value = seconds;

      return ((hours * 60 * 60) + (minutes * 60) + seconds) * 1000;
    }

    function formatUnit(value) {
      return String(value).padStart(2, "0");
    }

    function render(ms) {
      const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      hoursEl.textContent = formatUnit(hours);
      minutesEl.textContent = formatUnit(minutes);
      secondsEl.textContent = formatUnit(seconds);

      const percent = initialMs === 0 ? 0 : Math.round((ms / initialMs) * 100);
      progressFillEl.style.width = `${Math.max(0, Math.min(100, percent))}%`;
      percentEl.textContent = `${Math.max(0, Math.min(100, percent))}%`;
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      endTime = null;
    }

    function syncStatus(label, message) {
      phaseEl.textContent = label;
      statusTextEl.textContent = message;
    }

    function tick() {
      remainingMs = Math.max(0, endTime - Date.now());
      render(remainingMs);

      if (remainingMs <= 0) {
        stopTimer();
        clockCardEl.classList.add("done");
        syncStatus("已完成", "時間到。你可以按重設重新開始，或輸入新的倒數時間。");
      }
    }

    function startTimer() {
      if (timerId) {
        return;
      }

      if (remainingMs <= 0) {
        remainingMs = toMsFromInputs();
        initialMs = remainingMs;
      }

      if (remainingMs <= 0) {
        syncStatus("請先設定時間", "倒數時間不能是 0，請輸入至少 1 秒。");
        return;
      }

      clockCardEl.classList.remove("done");
      endTime = Date.now() + remainingMs;
      timerId = setInterval(tick, 200);
      syncStatus("倒數中", "計時進行中，按暫停可以先停住。");
      tick();
    }

    function pauseTimer() {
      if (!timerId) {
        return;
      }
      remainingMs = Math.max(0, endTime - Date.now());
      stopTimer();
      syncStatus("已暫停", "倒數已暫停，按開始 / 繼續可接著跑。");
      render(remainingMs);
    }

    function resetTimer() {
      stopTimer();
      remainingMs = toMsFromInputs();
      initialMs = remainingMs;
      clockCardEl.classList.remove("done");
      render(remainingMs);
      syncStatus("已重設", "已回到目前設定的時間，可以再次開始。");
    }

    function applyPreset() {
      inputHoursEl.value = 0;
      inputMinutesEl.value = 1;
      inputSecondsEl.value = 0;
      resetTimer();
    }

    startBtnEl.addEventListener("click", startTimer);
    pauseBtnEl.addEventListener("click", pauseTimer);
    resetBtnEl.addEventListener("click", resetTimer);
    presetBtnEl.addEventListener("click", applyPreset);

    [inputHoursEl, inputMinutesEl, inputSecondsEl].forEach((input) => {
      input.addEventListener("change", resetTimer);
    });

    render(remainingMs);
  </script>
</body>
</html>
